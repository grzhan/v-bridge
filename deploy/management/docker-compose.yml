services:
  mysql:
    image: mysql:8.0
    container_name: remote-gateway-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - management_mysql_data:/var/lib/mysql
    networks:
      - management_net

  backend:
    build:
      context: ../..
      dockerfile: deploy/management/Dockerfile.backend
    container_name: remote-gateway-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: remote-gateway-api
      APP_ENV: ${APP_ENV}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX}
      APP_DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      GUAC_BASE_URL: ${GUAC_BASE_URL}
      GUAC_USERNAME: ${GUAC_USERNAME}
      GUAC_PASSWORD: ${GUAC_PASSWORD}
      GUAC_DATA_SOURCE: ${GUAC_DATA_SOURCE}
      GUAC_ENABLED: ${GUAC_ENABLED}
      RECLAIM_INTERVAL_SECONDS: ${RECLAIM_INTERVAL_SECONDS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT}:8000"
    networks:
      - management_net

  frontend:
    build:
      context: ../..
      dockerfile: deploy/management/Dockerfile.frontend
      args:
        VITE_API_PORT: ${BACKEND_PORT}
    container_name: remote-gateway-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - management_net

volumes:
  management_mysql_data:

networks:
  management_net:
    driver: bridge
